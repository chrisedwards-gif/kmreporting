name: Fix UAT 011 draft validation

on:
  push:
    branches: [agent/uat-011-kitchen-checks]
    paths: [.github/workflows/fix-uat011-draft.yml]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/uat-011-kitchen-checks
      - name: Remove submit-only browser requirements
        shell: python
        run: |
          from pathlib import Path
          path = Path('src/components/kitchen-checks/kitchen-check-form.tsx')
          text = path.read_text()
          replacements = {
            ' required={isIssue} rows={2}': ' rows={2}',
            ' required value={response.actionText}': ' value={response.actionText}',
            ' required value={response.ownerProfileId}': ' value={response.ownerProfileId}',
            ' required type="date"': ' type="date"',
          }
          for old, new in replacements.items():
            if old not in text:
              raise SystemExit(f'missing expected text: {old}')
            text = text.replace(old, new, 1)
          path.write_text(text)
      - name: Commit patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/fix-uat011-draft.yml
          git add src/components/kitchen-checks/kitchen-check-form.tsx
          git commit -m "Allow incomplete kitchen check drafts"
          git push origin HEAD:agent/uat-011-kitchen-checks
