name: Fresh database validation

on:
  push:
    branches:
      - agent/uat-003-source-imports
      - agent/uat-014-fresh-db-gate
  pull_request:

concurrency:
  group: fresh-database-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # Pin the CLI so a new upstream release cannot silently break the
      # production database gate. Upgrade this deliberately after validation.
      - uses: supabase/setup-cli@v3
        with:
          version: 2.101.0

      - name: Start a fresh local Supabase database
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Starting local Supabase database (attempt ${attempt}/3)"
            if supabase db start; then
              exit 0
            fi
            supabase stop --no-backup || true
            sleep $((attempt * 10))
          done
          echo "Supabase failed to start after three clean attempts."
          supabase db start --debug

      - name: Rebuild from zero using all migrations and seeds
        run: supabase db reset --local

      - name: Run database smoke tests
        run: supabase test db --local

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup
