name: Apply UAT 005 usability patch

on:
  push:
    branches:
      - agent/uat-003-source-imports
    paths:
      - .github/workflows/apply-uat005.yml
      - .github/patches/uat005.part1
      - .github/patches/uat005.part2
      - .github/patches/uat005.part3
      - .github/patches/uat005.part4
      - .github/patches/uat005.part5

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/uat-003-source-imports
          fetch-depth: 0
      - name: Assemble and validate patch
        shell: bash
        run: |
          cat .github/patches/uat005.part{1,2,3,4,5} > /tmp/uat005.patch
          git apply --check /tmp/uat005.patch
      - name: Apply patch and remove staging files
        shell: bash
        run: |
          git apply /tmp/uat005.patch
          rm -f .github/patches/uat005.part{1,2,3,4,5}
          rm -f .github/workflows/apply-uat005.yml
      - name: Commit merged usability pass
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Apply UAT 005 usability and design pass"
          git push origin HEAD:agent/uat-003-source-imports
