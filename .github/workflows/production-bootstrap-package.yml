name: Production bootstrap package

on:
  push:
    branches:
      - agent/uat-003-source-imports
    paths:
      - .github/workflows/production-bootstrap-package.yml

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare production-safe package
        run: |
          mkdir -p production-bootstrap/supabase
          cp -R supabase/migrations production-bootstrap/supabase/migrations
          cp supabase/seed.sql production-bootstrap/supabase/seed.sql
          cp supabase/seed_dough_religion_checks.sql production-bootstrap/supabase/seed_dough_religion_checks.sql
          cat > production-bootstrap/README.txt <<'EOF'
          HOS Kitchen Reports production bootstrap

          Apply every SQL file in supabase/migrations in filename order.
          Then apply supabase/seed.sql and supabase/seed_dough_religion_checks.sql.
          Do not apply seed_performance.sql to production.
          EOF
      - uses: actions/upload-artifact@v4
        with:
          name: hos-production-bootstrap
          path: production-bootstrap
          if-no-files-found: error
          retention-days: 7
