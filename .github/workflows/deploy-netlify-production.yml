name: Deploy Netlify production

on:
  pull_request:
    paths:
      - '.github/workflows/deploy-netlify-production.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Deploy exact source to production
        run: >-
          npx -y @netlify/mcp@latest
