name: Apply fresh database fix

on:
  push:
    branches: [agent/uat-014-fresh-db-gate]
    paths: [.github/workflows/apply-fresh-db-fix.yml]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/uat-014-fresh-db-gate

      - name: Make optional helper revoke conditional
        shell: python
        run: |
          from pathlib import Path

          path = Path('supabase/migrations/014_draft_save_and_security.sql')
          text = path.read_text()
          old = """-- This is a database event-trigger helper, not an application RPC.
          revoke all on function public.rls_auto_enable() from public, anon, authenticated;
          """
          new = """-- This is a database event-trigger helper, not an application RPC.
          -- Supabase-hosted projects may provide it, while a fresh local database may not.
          do $$
          begin
            if to_regprocedure('public.rls_auto_enable()') is not null then
              execute 'revoke all on function public.rls_auto_enable() from public, anon, authenticated';
            end if;
          end;
          $$;
          """
          if old not in text:
            raise SystemExit('Expected migration 014 revoke block was not found.')
          path.write_text(text.replace(old, new, 1))

      - name: Commit migration repair
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-fresh-db-fix.yml
          git add supabase/migrations/014_draft_save_and_security.sql
          git commit -m "Make migration 014 fresh-database safe"
          git push origin HEAD:agent/uat-014-fresh-db-gate
