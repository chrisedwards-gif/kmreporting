name: Persona smoke

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  persona-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install isolated Playwright runner
        run: npm install --no-save --package-lock=false @playwright/test@1.55.0
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Walk Admin, Kitchen Manager and Viewer personas
        run: npx playwright test
