name: Persona smoke

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  persona-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run persona unit regressions
        shell: bash
        run: set -o pipefail; npm test 2>&1 | tee unit-test.log
      - name: Build demo application
        run: NEXT_PUBLIC_DEMO_MODE=true npm run build
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Walk Admin, Kitchen Manager and Viewer personas
        shell: bash
        run: set -o pipefail; npm run test:e2e 2>&1 | tee persona-smoke.log
      - name: Upload persona diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: persona-smoke-diagnostics
          path: |
            unit-test.log
            persona-smoke.log
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14
