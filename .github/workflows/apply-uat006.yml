name: Apply UAT 006 visual redesign

on:
  push:
    branches:
      - agent/uat-003-source-imports
    paths:
      - .github/workflows/apply-uat006.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/uat-003-source-imports
          fetch-depth: 0
      - name: Assemble and validate patch
        run: |
          cat .github/patches/uat006.part{1,2,3,4,5} > /tmp/uat006.patch
          git apply --check /tmp/uat006.patch
      - name: Apply redesign
        run: |
          git apply /tmp/uat006.patch
          rm -f .github/patches/uat006.part{1,2,3,4,5}
          rm -f .github/workflows/apply-uat006.yml
      - name: Commit redesign
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Apply UAT 006 visual redesign
          branch: agent/uat-003-source-imports
