name: Normalise UAT 008 assignment bootstrap

on:
  push:
    branches:
      - agent/uat-008-canonical-managers
    paths:
      - .github/workflows/fix-uat008-bootstrap.yml

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/uat-008-canonical-managers
      - name: Normalise assignment start to Sunday
        shell: python
        run: |
          from pathlib import Path
          import re

          path = Path("supabase/migrations/012_canonical_manager_identity.sql")
          text = path.read_text()
          pattern = re.compile(
              r"coalesce\(\s*s\.reporting_start_date,\s*current_date - extract\(dow from current_date\)::integer\s*\) as starts_on,",
              re.MULTILINE,
          )
          replacement = """coalesce(
                s.reporting_start_date - extract(dow from s.reporting_start_date)::integer,
                current_date - extract(dow from current_date)::integer
              ) as starts_on,"""
          updated, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit(f"Expected one bootstrap date block, found {count}")
          path.write_text(updated)
      - name: Remove workflow and commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/fix-uat008-bootstrap.yml
          git add supabase/migrations/012_canonical_manager_identity.sql
          git commit -m "Normalise primary manager assignment bootstrap"
          git push origin HEAD:agent/uat-008-canonical-managers
