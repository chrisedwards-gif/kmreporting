name: Lint diagnostics

on:
  pull_request:

jobs:
  lint-diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Capture lint output
        shell: bash
        run: |
          set +e
          npm run lint > lint-output.txt 2>&1
          status=$?
          cat lint-output.txt
          echo "lint_exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0
        id: lint
      - uses: actions/upload-artifact@v4
        with:
          name: lint-output
          path: lint-output.txt
          if-no-files-found: error
