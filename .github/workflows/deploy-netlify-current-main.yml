name: Deploy current main to Netlify production

on:
  pull_request:
    paths:
      - '.github/workflows/deploy-netlify-current-main.yml'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NETLIFY_SITE_ID: ad42ba1c-7fc2-4334-8b88-10fdcd569fda
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify Netlify credential
        shell: bash
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ]; then
            echo "NETLIFY_AUTH_TOKEN is not configured in GitHub Actions."
            exit 1
          fi

      - run: npm ci

      - name: Deploy exact source to Netlify production
        shell: bash
        run: |
          set -o pipefail
          npx -y netlify-cli@latest deploy \
            --build \
            --prod \
            --site "$NETLIFY_SITE_ID" \
            --auth "$NETLIFY_AUTH_TOKEN" \
            2>&1 | tee netlify-deploy.log

      - name: Upload deployment log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: netlify-current-main-deploy-log-secret
          path: netlify-deploy.log
          if-no-files-found: ignore
          retention-days: 1
