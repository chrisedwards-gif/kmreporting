name: UAT validation

on:
  push:
    branches:
      - agent/uat-003-source-imports
  pull_request:

concurrency:
  group: uat-validation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint
        id: lint
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee lint.log
      - name: Upload lint diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uat-lint-log
          path: lint.log
          if-no-files-found: error
          retention-days: 1
      - name: Enforce lint result
        if: steps.lint.outcome != 'success'
        run: exit 1
      - run: npm test
      - name: Build
        id: build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log
      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uat-build-log
          path: build.log
      - name: Package production-safe database bootstrap
        run: |
          mkdir -p production-bootstrap/supabase
          cp -R supabase/migrations production-bootstrap/supabase/migrations
          cp supabase/seed.sql production-bootstrap/supabase/seed.sql
          cp supabase/seed_dough_religion_checks.sql production-bootstrap/supabase/seed_dough_religion_checks.sql
          cat > production-bootstrap/README.txt <<'EOF'
          HOS Kitchen Reports production bootstrap

          Apply every SQL file in supabase/migrations in filename order.
          Then apply supabase/seed.sql and supabase/seed_dough_religion_checks.sql.
          Do not apply seed_performance.sql to production.
          EOF
      - name: Upload production bootstrap
        uses: actions/upload-artifact@v4
        with:
          name: hos-production-bootstrap
          path: production-bootstrap
          if-no-files-found: error
          retention-days: 7
      - name: Enforce build result
        if: steps.build.outcome != 'success'
        run: exit 1
