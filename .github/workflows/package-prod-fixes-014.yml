name: Package production fixes 014 source

on:
  push:
    branches:
      - agent/prod-fixes-014-management-integrity
    paths:
      - '.github/workflows/package-prod-fixes-014.yml'

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Package source
        shell: bash
        run: |
          set -euo pipefail
          git archive --format=tar.gz --output=kmreporting-source.tar.gz HEAD
      - uses: actions/upload-artifact@v4
        with:
          name: prod-fixes-014-source
          path: kmreporting-source.tar.gz
          if-no-files-found: error
          retention-days: 1
