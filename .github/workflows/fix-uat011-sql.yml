name: Repair UAT 011 SQL

on:
  push:
    branches:
      - agent/uat-008-canonical-managers
    paths:
      - .github/workflows/fix-uat011-sql.yml

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/uat-008-canonical-managers
      - name: Repair legacy counter
        shell: python
        run: |
          from pathlib import Path

          path = Path("supabase/migrations/011_one_to_one_reviews.sql")
          text = path.read_text()
          declaration = "  incoming_ids uuid[] := '{}';"
          if declaration not in text:
              raise SystemExit("Legacy declaration not found")
          text = text.replace(
              declaration,
              "  action_id uuid;\n  incoming_count integer := 0;",
              1,
          )
          target = "returning id into strict incoming_ids[cardinality(incoming_ids) + 1];"
          if text.count(target) != 2:
              raise SystemExit("Expected two legacy array targets")
          text = text.replace(
              target,
              "returning id into action_id;\n      incoming_count := incoming_count + 1;",
          )
          text = text.replace("cardinality(incoming_ids)", "incoming_count")
          path.write_text(text)
      - name: Remove workflow and commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/fix-uat011-sql.yml
          git add supabase/migrations/011_one_to_one_reviews.sql
          git commit -m "Repair legacy 1-1 migration action counter"
          git push origin HEAD:agent/uat-008-canonical-managers
