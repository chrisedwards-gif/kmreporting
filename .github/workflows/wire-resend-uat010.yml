name: Wire Resend UAT 010

on:
  push:
    branches: [agent/uat-010-platform-product]
    paths: [.github/workflows/wire-resend-uat010.yml]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/uat-010-platform-product
      - name: Patch finalised review delivery
        shell: python
        run: |
          from pathlib import Path
          path = Path('src/app/actions/one-to-ones.ts')
          text = path.read_text()
          old_import = 'import { deliverReminderWebhook } from "@/lib/notifications/delivery";'
          new_import = old_import + '\nimport { sendTransactionalEmail } from "@/lib/notifications/email";'
          if old_import not in text:
              raise SystemExit('delivery import not found')
          text = text.replace(old_import, new_import, 1)

          marker = '''  if (!intendedEmail) return "Review finalised. Add a notification email to the manager account before resending.";
          if (!environment.reminderWebhookUrl) {
            revalidatePath("/notifications");
            return `Review finalised and queued for ${intendedEmail}. Configure the delivery webhook before expecting an email.`;
          }

          const actualEmail = environment.reminderRecipientOverride ?? intendedEmail;'''
          replacement = '''  if (!intendedEmail) return "Review finalised. Add a notification email to the manager account before resending.";

          const resendDelivery = await sendTransactionalEmail({
            to: intendedEmail,
            subject: email.subject,
            text: email.body,
            idempotencyKey: `one-to-one-${reviewId}`,
          });
          if (resendDelivery.configured) {
            await admin.from("notification_log").update({
              delivery_status: resendDelivery.ok ? "sent" : "failed",
              provider_reference: resendDelivery.providerReference || null,
              error_message: resendDelivery.ok ? null : resendDelivery.error,
              sent_at: resendDelivery.ok ? new Date().toISOString() : null,
            }).eq("id", logged.id);
            revalidatePath("/notifications");
            return resendDelivery.ok
              ? `Review finalised and sent by Resend to ${environment.reminderRecipientOverride ?? intendedEmail}${environment.reminderRecipientOverride ? " through the UAT override" : ""}.`
              : `Review finalised, but Resend delivery failed: ${resendDelivery.error}`;
          }

          if (!environment.reminderWebhookUrl) {
            revalidatePath("/notifications");
            return `Review finalised and queued for ${intendedEmail}. Configure Resend or the delivery webhook before expecting an email.`;
          }

          const actualEmail = environment.reminderRecipientOverride ?? intendedEmail;'''
          if marker not in text:
              raise SystemExit('delivery block not found')
          path.write_text(text.replace(marker, replacement, 1))
      - name: Commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/wire-resend-uat010.yml
          git add src/app/actions/one-to-ones.ts
          git commit -m "Send finalised 1-1s through Resend"
          git push origin HEAD:agent/uat-010-platform-product
